server.port=${FRONTEND_PORT:8081}

backend.url=${BACKEND_URL:http://localhost:8080}
backend.customer-user=${BACKEND_CUSTOMER_USER:${CUSTOMER_USER:customer}}
backend.customer-pass=${BACKEND_CUSTOMER_PASS:${CUSTOMER_PASS:changeme}}
backend.admin-user=${BACKEND_ADMIN_USER:${ADMIN_USER:admin}}
backend.admin-pass=${BACKEND_ADMIN_PASS:${ADMIN_PASS:changeme}}

spring.application.name=Copa Ticketing
vaadin.launch-browser=false
vaadin.heartbeat-interval=60
vaadin.close-idle-sessions=true
